<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${titulo}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/jquery-ui.min.css}" />
</head>
<body>

    <table th:fragment="itemsFactura" class="d-none">
        <tbody id="plantillaItemsFactura">
            <tr id="row_{ID}">
                <td class="d-none"><input type="hidden" value="{ID}" name="item_id[]" /></td>
                <td>{NOMBRE}</td>
                <td>{PRECIO}</td>
                <td><input type="number" value="1" name="cantidad_[]" id="cantidad_{ID}"
                           class="form-control col-sm-2" onchange="itemsHelper.calcularImporte({ID}, {PRECIO}, this.value);" /></td>
                <td><span id="total_importe_{ID}">0</span></td>
                <td><a href="#" class="btn btn-danger btn-xs" onclick="itemsHelper.eliminarLineaFactura({ID});">X</a> </td>
            </tr>
        </tbody>
    </table>



    <script th:src="@{/js/jquery-4.0.0.min.js}"></script>
    <script th:src="@{/js/jquery-ui.min.js}"></script>
</body>
</html>
