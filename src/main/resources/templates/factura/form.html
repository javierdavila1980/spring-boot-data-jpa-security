<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${titulo}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/jquery-ui.min.css}" />
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Spring Boot</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/listar}">Clientes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Pricing</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="card bg-light">
            <div class="card-header" th:text="${titulo}"></div>
            <div class="card-body">
                <h4 class="card-title">
                    <a class="btn btn-light btn-xs" th:href="@{/ver/} + ${factura.cliente.id}" th:text="'Volver'"></a>
                </h4>

                <form th:action="@{/factura/form}" th:object="${factura}" method="post">
                    <div class="form-group row">
                        <div class="col-sm-6">
                            <label class="col-sm-2 col-form-label" th:text="'Cliente'"></label>
                            <input th:value="${factura.cliente.nombre}" class="form-control" disabled='disabled' />
                        </div>
                    </div>

                    <div class="form-group row">
                        <label class="col-sm-2 col-form-label" th:text="'Descripción'"></label>
                        <div class="col-sm-6">
                            <input type="text" th:field="*{descripcion}" class="form-control" />
                        </div>
                    </div>

                    <div class="form-group row">
                        <label class="col-sm-2 col-form-label" th:text="'Descripción'"></label>
                        <div class="col-sm-6">
                            <textarea th:field="*{observacion}" class="form-control"></textarea>
                        </div>
                    </div>

                    <div class="form-group row">
                        <label class="col-sm-2 col-form-label" th:text="'Buscar Producto'"></label>
                        <div class="col-sm-6">
                            <input type="text" name="buscar_producto" id="buscar_producto" class="form-control" />
                        </div>
                    </div>

                    <table th:replace="factura/plantilla-items :: itemsFactura"></table>

                    <table id="cargarItemProductos" class="table table-sm table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Cantidad</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody>

                        </tbody>
                    </table>
                    <h5>TOTAL FACTURA: <span id="gran_total">0</span></h5>

                    <div class="form-group row">
                        <div class="col-sm-6">
                            <input type="submit" th:value="${titulo}" class="btn btn-secondary" />
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:src="@{/js/jquery-4.0.0.min.js}"></script>
    <script th:src="@{/js/jquery-ui.min.js}"></script>
    <script th:replace="/factura/js/autocomplete-productos :: javascript"></script>
</body>
</html>
